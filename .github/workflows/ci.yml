name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lineageguard-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.26"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install locked dependencies
        run: uv sync --all-extras --frozen
      - name: Static and unit gates
        run: make check
      - name: Real dbt and DuckDB integration gates
        run: make test-integration
      - name: Build and inspect release archives
        run: |
          uv build --out-dir dist
          uv run python scripts/verify-release.py \
            --sdist dist/lineageguard_pr_agent-0.1.0.tar.gz \
            --wheel dist/lineageguard_pr_agent-0.1.0-py3-none-any.whl
      - name: Install base wheel in isolation
        run: |
          uv venv --python ${{ matrix.python-version }} /tmp/lineageguard-wheel
          uv pip install --python /tmp/lineageguard-wheel/bin/python \
            dist/lineageguard_pr_agent-0.1.0-py3-none-any.whl
          /tmp/lineageguard-wheel/bin/lineageguard version
          /tmp/lineageguard-wheel/bin/python -c \
            "from lineageguard.cli import REPOSITORY_ROOT; assert (REPOSITORY_ROOT / 'demo/acme_dbt/dbt_project.yml').is_file()"
